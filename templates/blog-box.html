        <article class="blog-box">
          <div class="blog-content">
            <div class="text">
              <h2>
                <a href="{{URL}}">{{TITLE}}</a>
              </h2>
              <p class="blog-date">
                <time datetime="{{DATE}}">{{DATE_DISPLAY}}</time>
              </p>
              <p>{{EXCERPT}}</p>
            </div>
            <img
              src="{{IMAGE}}"
              alt="{{IMAGE_ALT}}"
            />
          </div>
        </article>
